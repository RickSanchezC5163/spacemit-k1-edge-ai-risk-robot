bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 100
    default_server_timeout: 1000
    wait_for_service_timeout: 3000
    default_nav_to_pose_bt_xml: "$(find-pkg-share turn_on_wheeltec_robot)/config/nav2_n10p_tank_no_recovery.xml"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    odom_topic: /odom
    min_x_velocity_threshold: 0.03
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.03
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.03
      movement_time_allowance: 60.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.30

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.30
      max_vel_y: 0.0
      max_vel_theta: 0.80
      min_speed_xy: 0.0
      max_speed_xy: 0.30
      min_speed_theta: 0.0
      acc_lim_x: 0.60
      acc_lim_y: 0.0
      acc_lim_theta: 1.20
      decel_lim_x: -0.80
      decel_lim_y: 0.0
      decel_lim_theta: -1.50
      vx_samples: 14
      vy_samples: 0
      vtheta_samples: 28
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.05
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.10
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      BaseObstacle.scale: 0.04
      PathAlign.scale: 24.0
      PathAlign.forward_point_distance: 0.12
      GoalAlign.scale: 18.0
      GoalAlign.forward_point_distance: 0.12
      PathDist.scale: 24.0
      GoalDist.scale: 18.0
      RotateToGoal.scale: 24.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      Oscillation.oscillation_reset_dist: 0.05
      Oscillation.oscillation_reset_angle: 0.10

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 6.0
      publish_frequency: 3.0
      global_frame: odom
      robot_base_frame: base_footprint
      transform_tolerance: 0.5
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[[0.27, 0.22], [0.27, -0.22], [-0.23, -0.22], [-0.23, 0.22]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_min_range: 0.05
          obstacle_max_range: 1.5
          raytrace_min_range: 0.05
          raytrace_max_range: 2.0
          max_obstacle_height: 1.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.24
        cost_scaling_factor: 4.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_footprint
      transform_tolerance: 0.5
      rolling_window: false
      width: 4
      height: 4
      origin_x: -2.0
      origin_y: -2.0
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.23, 0.17], [0.23, -0.17], [-0.19, -0.17], [-0.19, 0.17]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_min_range: 0.05
          obstacle_max_range: 2.5
          raytrace_min_range: 0.05
          raytrace_max_range: 3.0
          max_obstacle_height: 1.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.10
        cost_scaling_factor: 3.0
      always_send_full_costmap: false

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.05
      use_astar: false
      allow_unknown: true
      use_final_approach_orientation: false

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 8.0
    # Keep the action servers available because bt_navigator loads both
    # NavigateToPose and NavigateThroughPoses BTs during lifecycle activation.
    # The guarded NavigateToPose XML above does not call spin/backup/wait.
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.2
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.25
    min_rotational_vel: 0.10
    rotational_acc_lim: 0.45

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 10
    stop_on_failure: true
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 500

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 12.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.25, 0.0, 0.35]
    min_velocity: [0.0, 0.0, -0.35]
    max_accel: [0.25, 0.0, 0.45]
    max_decel: [-0.45, 0.0, -0.60]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.5

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
