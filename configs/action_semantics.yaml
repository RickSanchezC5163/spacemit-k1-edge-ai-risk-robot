    purpose: Keep current state and observe.
    rl_enabled: true
    sim_enabled: true
    real_enabled: true
    safety_gate_required: false
  FORWARD_0P15:
    purpose: Short guarded forward step.
    rl_enabled: true
    sim_enabled: true
    real_enabled: true
    safety_gate_required: true
    real_execution: publish /input_cmd_vel only through existing P4 runner
  ARC_FAST_LEFT:
    purpose: Warning-band guarded left arc.
    rl_enabled: true
    sim_enabled: true
    real_enabled: true
    safety_gate_required: true
    real_execution: publish /input_cmd_vel only through existing P4 runner
  ARC_FAST_RIGHT:
    purpose: Warning-band guarded right arc.
    rl_enabled: true
    sim_enabled: true
    real_enabled: true
    safety_gate_required: true
    real_execution: publish /input_cmd_vel only through existing P4 runner
  SAVE_MAP:
    purpose: Save current map after safe stop.
    rl_enabled: false
    sim_enabled: true
    real_enabled: true
    requires_base_zero: true
  STOP_SAFE:
    purpose: Stop and settle until base_zero.
    rl_enabled: true
    sim_enabled: true
    real_enabled: true
    safety_gate_required: true
  HOLD_CAPTURE:
